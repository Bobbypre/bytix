<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - Bytix Advance</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .topbar {
      background: #1e293b;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin-top: 15px;
      border-radius: 10px;
    }

    button {
      padding: 10px;
      background: #38bdf8;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="topbar">
    Bytix Advance Dashboard
  </div>

  <div class="container">

    <div class="card">
      <h3>Welcome back 👋</h3>
      <p>Your account overview will show here.</p>
    </div>

    <div class="card">
      <h3>Balance</h3>
      <p>$10,000 (demo)</p>
    </div>

    <div class="card">
      <h3>Actions</h3>
      <button onclick="alert('Deposit clicked')">Deposit</button>
      <button onclick="alert('Withdraw clicked')">Withdraw</button>
    </div>

  </div>

</body>
</html>
